<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift for you</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffe6f0,#e6fff2);
    position:relative;
    min-height:100vh;
}

/* Background icons */
.bg-icon{
    position:absolute;
    pointer-events:none;
    animation:float 6s infinite ease-in-out;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}

@keyframes rotateGift{
    0%,100%{
        transform:rotate(-5deg);
    }

    50%{
        transform:rotate(5deg);
    }
}

@keyframes shakeGift{
    0%{
        transform:translateX(0);
        box-shadow:0 0 0px gold;
    }

    50%{
        transform:translateX(10px);
        box-shadow:0 0 40px gold;
    }

    100%{
        transform:translateX(0);
        box-shadow:0 0 0px gold;
    }
}

.container{
    text-align:center;
    z-index:10;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:200px;
}

h1{
    margin-bottom:120px;
    color:#d63384;
    font-size:52px;

    transition:all 0.8s ease;
}

#background{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

html, body{
    width:100%;
    height:100%;
    overflow-x:hidden;
}

.gift-box{
    width:180px;
    height:140px;
    background:#ff4d6d;
    margin:auto;
    position:relative;
    cursor:pointer;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);

    animation:rotateGift 4s ease-in-out infinite;
}

.gift-box:hover{
    transform:scale(1.05);
}

.gift-box::before{
    content:"";
    position:absolute;
    width:30px;
    height:140px;
    background:#ffd43b;
    left:75px;
}

.gift-box::after{
    content:"";
    position:absolute;
    width:180px;
    height:25px;
    background:#ff758f;
    top:-20px;
    left:0;
    border-radius:8px 8px 0 0;
}

.ribbon{
    position:absolute;
    width:70px;
    height:70px;
    border:12px solid #ffd43b;
    border-radius:50%;
    top:-55px;
}

.left{
    left:25px;
}

.right{
    right:25px;
}

.message{
    margin-top:15px;
    padding:25px 35px;

    background:rgba(255,255,255,0.95);

    border-radius:20px;

    border:3px solid #ffb3c6;

    display:none;

    max-width:520px;
    width:90%;
    text-align:center;
    color:#444;
    font-size:22px;
    line-height:1.8;

    animation:
        fadeIn 1.5s ease,
        glowBorder 1s infinite alternate;

    box-shadow:
        0 0 10px #ff4d6d,
        0 0 20px #ff4d6d,
        0 0 30px #ff4d6d;
}


@keyframes glowBorder{

    from{
        box-shadow:
            0 0 10px #ff4d6d,
            0 0 20px #ff4d6d,
            0 0 30px #ff4d6d;
    }

    to{
        box-shadow:
            0 0 20px #ff4d6d,
            0 0 40px #ff4d6d,
            0 0 60px #ff4d6d;
    }
}


@keyframes blinkLight{
    from{
        box-shadow:
            0 0 10px #ff4d6d,
            0 0 20px #ff4d6d;
    }

    to{
        box-shadow:
    0 0 8px #ff4d6d,
    0 0 16px #ff4d6d,
    0 0 24px #ff4d6d;
    }
}

@keyframes moveTitleUp{
    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-30px);
    }
}
</style>
</head>
<body>

<div id="background"></div>

<div class="container">
    <h1 id="giftTitle">🎁 Gift for you 🎁</h1>

    <div class="gift-box" onclick="showMessage()">
    <div class="ribbon left"></div>
    <div class="ribbon right"></div>
</div>

    <div class="message" id="message">
        💖 Chúc em Thanh Tâm A.K.A Pure Heart A.K.A TTTT thi thật tốt và đạt kết quả như mong đợi!!! 🍀❤️
    </div>
</div>

<script>
function showMessage(){

    const msg = document.getElementById("message");
    const giftBox = document.querySelector(".gift-box");

    giftBox.style.pointerEvents = "none";

    // Xoay cực nhanh khi mở quà
    giftBox.style.animation =
    "rotateGift 0.3s ease-in-out infinite";

    setTimeout(() => {

        giftBox.style.animation =
            "shakeGift 1s ease-in-out";

    }, 1000);

    setTimeout(() => {

    const title = document.getElementById("giftTitle");

    title.style.opacity = "0";
    title.style.transform = "translateY(-30px)";

    setTimeout(() => {
        title.style.display = "none";
    }, 800);

    msg.style.display = "block";

}, 2000);
}

const bg = document.getElementById("background");

// ======================
// TẠO CHỮ "Thanh Tâm" BẰNG TRÁI TIM
// ======================

const canvas = document.createElement("canvas");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const ctx = canvas.getContext("2d");

ctx.fillStyle = "#000";
ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.font = "bold 180px Arial";

ctx.fillText(
    "Thanh Tâm",
    canvas.width / 2,
    canvas.height / 2 - 200
);

const imageData = ctx.getImageData(
    0,
    0,
    canvas.width,
    canvas.height
);

const data = imageData.data;

// Trái tim tạo thành chữ
for(let y = 0; y < canvas.height; y += 8){
    for(let x = 0; x < canvas.width; x += 8){

        const index = (y * canvas.width + x) * 4;

        if(data[index + 3] > 100){

            const heart = document.createElement("div");

            heart.className = "bg-icon";
            heart.innerHTML = "❤️";

            heart.style.left = x + "px";
            heart.style.top = y + "px";

            heart.style.fontSize = "22px";
            heart.style.opacity = "0.9";

            bg.appendChild(heart);
        }
    }
}

// ======================
// CỎ BỐN LÁ PHÂN BỐ ĐỀU BACKGROUND
// ======================

for(let i = 0; i < 250; i++){

    const clover = document.createElement("div");

    clover.className = "bg-icon";
    clover.innerHTML = "🍀";

    clover.style.left =
        Math.random() * window.innerWidth + "px";

    clover.style.top =
        Math.random() * window.innerHeight + "px";

    clover.style.fontSize =
        (18 + Math.random() * 10) + "px";

    clover.style.opacity = "0.35";

    clover.style.animationDuration =
        (4 + Math.random() * 6) + "s";

    bg.appendChild(clover);
}
</script>

</body>
</html>
